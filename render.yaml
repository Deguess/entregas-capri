services:
  - type: web
    name: delivery-routes-api
    env: python
    region: ohio
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: delivery_routes
      - key: CORS_ORIGINS
        value: "*"
    healthCheckPath: /api/
